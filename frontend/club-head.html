<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Club Head Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="head.css">
  <link rel="stylesheet" href="calendar.css">
</head>

<body>
  <div class="navbar">
    <span>CLUB HEAD - <span id="headName"></span></span>
    <div>
      <a href="#" id="logoutBtn">Logout</a>
    </div>
  </div>

  <div class="container">
    <div class="card">
      <h3>👋 Welcome, Head!</h3>
      <p>Manage club members and assign tasks to keep your team on track.</p>
    </div>

    <div class="action-buttons">
      <button class="btn-primary" onclick="openCreateTaskModal()">➕ Create New Task</button>
      <button class="btn-secondary" onclick="toggleMediaSection()">📸 Review Media Submissions</button>
    </div>

    <!-- Media Review Section -->
    <div id="mediaSection">
      <h3>📸 Pending Media Submissions</h3>
      <div id="pendingMediaList"></div>
    </div>

    <!-- Tasks Assigned TO Me (By President) -->
    <h3>📌 Tasks Assigned To Me</h3>
    <div id="assignedToMeList" class="tasks-grid"></div>

    <!-- My Submitted Media (Head's history) -->
    <div class="card" style="margin-top: 30px;">
      <h3>📂 My Submitted Work (History)</h3>
      <div id="myMediaList"></div>
    </div>

    <!-- Performance Graph -->
    <h3>📈 Club Performance</h3>
    <div class="stats-overview" style="display: flex; gap: 20px; margin-bottom: 30px;">
      <div class="graph-container" style="flex: 1; background: white; padding: 20px; border-radius: 15px;">
        <canvas id="performanceChart"></canvas>
      </div>
      <div id="detailedStats"
        style="flex: 1; background: white; padding: 20px; border-radius: 15px; display: flex; flex-direction: column; gap: 15px;">
        <!-- Stats will be injected here -->
        <p style="color: #636e72; text-align: center;">Loading detailed stats...</p>
      </div>
    </div>

    <!-- Assignments Management -->
    <h3>📊 Tasks You Assigned</h3>
    <div class="filter-section">
      <button class="filter-btn active" onclick="filterTasks('all')">All Tasks</button>
      <button class="filter-btn" onclick="filterTasks('pending')">Pending</button>
      <button class="filter-btn" onclick="filterTasks('completed')">Completed</button>
    </div>
    <div id="tasksList"></div>
  </div>

  <!-- Upload Modal for Head -->
  <div id="uploadModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Submit Task</h2>
        <button class="close-btn" onclick="closeUploadModal()">&times;</button>
      </div>
      <form id="uploadForm">
        <input type="hidden" id="uploadTaskId">
        <div class="form-group">
          <label>Description</label>
          <textarea id="uploadDescription" required></textarea>
        </div>
        <div class="form-group">
          <label>File (Image/Video)</label>
          <input type="file" id="uploadFile" required>
        </div>
        <button type="submit" class="btn-primary" style="width: 100%;">Submit</button>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- Create Task Modal -->
  <div id="createTaskModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Create New Task</h2>
        <button class="close-btn" onclick="closeCreateTaskModal()">&times;</button>
      </div>
      <form id="createTaskForm">
        <div class="form-group">
          <label>Task Title *</label>
          <input type="text" id="taskTitle" required>
        </div>
        <div class="form-group">
          <label>Type *</label>
          <select id="taskType" required>
            <option value="task" selected>Task</option>
            <option value="meeting">Meeting</option>
          </select>
        </div>
        <div class="form-group">
          <label>Description *</label>
          <textarea id="taskDescription" required></textarea>
        </div>
        <div class="form-group">
          <label>Assign To *</label>
          <select id="taskMember" required>
            <option value="">Select a member...</option>
          </select>
        </div>
        <div class="form-group">
          <label>Priority *</label>
          <select id="taskPriority" required>
            <option value="low">Low</option>
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
          </select>
        </div>
        <div class="form-group">
          <label>Deadline *</label>
          <input type="datetime-local" id="taskDeadline" required>
        </div>
        <button type="submit" class="btn-primary" style="width: 100%;">Create Task</button>
      </form>
    </div>
  </div>
  <script src="utils.js"></script>
  <script src="head.js"></script>
  <script src="global-format.js"></script>
  <script src="calendar.js"></script>
  <!-- for club-member specifically, also add member-append.js after member.js -->
  <!-- club-member.html: <script src="member.js"></script> -->
  <!-- then append: -->

</body>

</html>
